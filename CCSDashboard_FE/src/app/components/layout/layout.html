<div class="min-h-screen bg-slate-100 flex flex-col">
  <header class="bg-blue-900 text-white shadow-md">
    <div class="flex items-center justify-between px-6 py-3">
      <div class="flex items-center gap-4">
        <img src="/images.jpeg" alt="CMRL Logo" class="h-10 w-auto" />
        <div>
          <p class="text-sm text-blue-200">Chennai Metro Rail Limited</p>
          <h1 class="text-lg font-semibold">Competency Certificate System</h1>
        </div>
      </div>

      <nav class="flex items-center gap-1">
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-blue-800"
          class="rounded px-4 py-2 text-sm font-medium hover:bg-blue-800 transition-colors"
        >
          Dashboard
        </a>
        <a
          routerLink="/reports"
          routerLinkActive="bg-blue-800"
          [routerLinkActiveOptions]="{ exact: false }"
          class="rounded px-4 py-2 text-sm font-medium hover:bg-blue-800 transition-colors"
        >
          Reports
        </a>
        <button
          type="button"
          (click)="logout()"
          class="ml-4 rounded border border-blue-700 px-4 py-2 text-sm font-medium hover:bg-blue-800 transition-colors"
        >
          Logout
        </button>
      </nav>
    </div>
  </header>

  <main class="flex-1 p-8">
    <router-outlet />
  </main>
</div>
