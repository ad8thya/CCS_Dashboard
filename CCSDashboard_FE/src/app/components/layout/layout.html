<div class="min-h-screen flex flex-col" style="background: var(--cmrl-surface)">
  <header
    class="text-white border-b border-blue-950"
    style="background: var(--cmrl-blue)"
  >
    <div class="max-w-[1400px] mx-auto flex items-center justify-between px-6 py-3">
      <div class="flex items-center gap-4">
        <img src="/images.jpeg" alt="CMRL Logo" class="h-10 w-auto bg-white rounded-sm p-0.5" />
        <div>
          <p class="text-xs text-blue-200 uppercase tracking-wide">
            Chennai Metro Rail Limited
          </p>
          <h1 class="text-base font-semibold leading-tight">
            Competency Certificate System
          </h1>
        </div>
      </div>

      <nav class="flex items-center gap-1 text-sm" aria-label="Main navigation">
        <a
          routerLink="/dashboard"
          routerLinkActive="nav-active"
          class="nav-link"
        >
          Dashboard
        </a>
        <a
          routerLink="/reports"
          routerLinkActive="nav-active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="nav-link"
        >
          Reports
        </a>
        <button type="button" (click)="logout()" class="btn-logout ml-3">
          Logout
        </button>
      </nav>
    </div>
  </header>

  <main class="flex-1 max-w-[1400px] w-full mx-auto px-6 py-6">
    <router-outlet />
  </main>

  <footer class="border-t border-gray-300 bg-white text-xs text-gray-500 py-3 px-6 text-center">
    Chennai Metro Rail Limited — Competency Certificate System (Internal Use)
  </footer>
</div>
