<h2 class="text-2xl font-bold mb-4">
  Competency Register
</h2>

<table class="w-full bg-white shadow rounded">

  <thead>
    <tr>
      <th>Staff ID</th>
      <th>Name</th>
      <th>Designation</th>
      <th>Certificate No</th>
      <th>Expiry Date</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let e of employees">

      <td>{{e.staffId}}</td>
      <td>{{e.name}}</td>
      <td>{{e.designation}}</td>
      <td>{{e.certificateNo}}</td>
      <td>{{e.expiryDate}}</td>

    </tr>

  </tbody>

</table>
