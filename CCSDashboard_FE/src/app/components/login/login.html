<nav class="h-20 bg-blue-900 shadow-md flex items-center px-8">

<img
 src="/images.jpeg"
 alt="CMRL Logo"
 class="h-12 w-auto">

  <div class="ml-4">
    <h1 class="text-white text-xl font-semibold">
      Chennai Metro Rail Limited
    </h1>
  </div>

</nav>

<div class="relative h-[calc(100vh-80px)]">

<img
 src="/cmrl2.png"
 alt="Metro"
 class="absolute inset-0 w-full h-full object-cover">

  <div class="absolute inset-0 bg-gradient-to-r from-black/50 to-transparent"></div>

  <div class="absolute right-12 top-1/2 -translate-y-1/2">


<div class="w-[420px] h-fit bg-white shadow-2xl rounded-xl p-10">

  <div class="text-center mb-8">

    <h1 class="text-3xl font-bold text-blue-900">
      CMRL
    </h1>

    <h2 class="text-xl font-semibold mt-2 text-gray-800">
      Competency Certificate System
    </h2>

    <p class="text-sm text-gray-500 mt-2">
      Chennai Metro Rail Limited
    </p>

  </div>

  <div class="space-y-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Username
      </label>

      <input
        type="text"
        [(ngModel)]="username"
        placeholder="Enter username"
        class="w-full border border-gray-300 rounded-lg px-4 py-2">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Password
      </label>

      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Enter password"
        class="w-full border border-gray-300 rounded-lg px-4 py-2">
    </div>

    @if (loginError) {
      <p class="text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
        {{ loginError }}
      </p>
    }

    <button
      (click)="login()"
      class="w-full bg-blue-900 text-white py-2 rounded-lg">
      Sign In
    </button>

  </div>

</div>


  </div>

</div>
